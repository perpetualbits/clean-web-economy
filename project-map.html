<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Clean Web Economy — Project Map</title>
<style>
  /* ---- Tokens: light is the default; dark overrides via media + data-theme --- */
  :root {
    --bg: #e9edf3; --panel: #ffffff; --panel-2: #f3f6fb; --border: #d3dbe8;
    --text: #18202f; --muted: #586882; --heading: #0e1725; --edge: #b7c2d4;
    --done: #12a677; --active: #c07d1e; --planned: #6f7f9b; --seam: #7a68e0;
    --done-bg: #12a67718; --active-bg: #c07d1e18; --planned-bg: #6f7f9b18; --seam-bg: #7a68e018;
    --accent: #12a677; --shadow: 0 1px 2px #10203808, 0 8px 24px #1020380f;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0c121c; --panel: #141c2a; --panel-2: #1a2434; --border: #273444;
      --text: #e5ecf6; --muted: #8fa0b9; --heading: #f1f6fc; --edge: #33435a;
      --done: #2bd7a4; --active: #f4b755; --planned: #8394ae; --seam: #a495ff;
      --done-bg: #2bd7a41f; --active-bg: #f4b7551f; --planned-bg: #8394ae1f; --seam-bg: #a495ff1f;
      --accent: #2bd7a4; --shadow: 0 1px 2px #0006, 0 10px 30px #0008;
    }
  }
  /* Explicit toggle wins over the OS media query, in both directions. */
  :root[data-theme="light"] {
    --bg: #e9edf3; --panel: #ffffff; --panel-2: #f3f6fb; --border: #d3dbe8;
    --text: #18202f; --muted: #586882; --heading: #0e1725; --edge: #b7c2d4;
    --done: #12a677; --active: #c07d1e; --planned: #6f7f9b; --seam: #7a68e0;
    --done-bg: #12a67718; --active-bg: #c07d1e18; --planned-bg: #6f7f9b18; --seam-bg: #7a68e018;
    --accent: #12a677; --shadow: 0 1px 2px #10203808, 0 8px 24px #1020380f;
  }
  :root[data-theme="dark"] {
    --bg: #0c121c; --panel: #141c2a; --panel-2: #1a2434; --border: #273444;
    --text: #e5ecf6; --muted: #8fa0b9; --heading: #f1f6fc; --edge: #33435a;
    --done: #2bd7a4; --active: #f4b755; --planned: #8394ae; --seam: #a495ff;
    --done-bg: #2bd7a41f; --active-bg: #f4b7551f; --planned-bg: #8394ae1f; --seam-bg: #a495ff1f;
    --accent: #2bd7a4; --shadow: 0 1px 2px #0006, 0 10px 30px #0008;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--sans);
    line-height: 1.5; -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }

  .wrap { max-width: 1440px; margin: 0 auto; padding: 28px clamp(16px, 4vw, 40px) 64px; }

  /* ---- Masthead ------------------------------------------------------- */
  header.mast { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 20px 28px; margin-bottom: 22px; }
  .brand { flex: 1 1 460px; min-width: 0; }
  .eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); margin: 0 0 8px; }
  h1 { font-size: clamp(26px, 4.4vw, 40px); line-height: 1.06; margin: 0; color: var(--heading); letter-spacing: -.02em; text-wrap: balance; font-weight: 800; }
  .tagline { color: var(--muted); margin: 10px 0 0; max-width: 62ch; font-size: 15px; }
  .meta { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-top: 10px; }

  .stats { display: flex; gap: 10px; align-items: stretch; flex-wrap: wrap; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; min-width: 96px; box-shadow: var(--shadow); }
  .stat .n { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--heading); font-variant-numeric: tabular-nums; line-height: 1; }
  .stat .l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-top: 6px; }
  .stat.progress { min-width: 200px; flex: 1 1 200px; }
  .bar { height: 7px; border-radius: 99px; background: var(--panel-2); border: 1px solid var(--border); overflow: hidden; margin-top: 9px; display: flex; }
  .bar > i { display: block; height: 100%; }
  .bar > i.done { background: var(--done); }
  .bar > i.active { background: var(--active); }

  .themebtn { font-family: var(--mono); font-size: 12px; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 9px 13px; cursor: pointer; align-self: flex-start; }
  .themebtn:hover { border-color: var(--accent); }

  /* ---- Legend --------------------------------------------------------- */
  .legend { display: flex; flex-wrap: wrap; gap: 8px 18px; align-items: center; padding: 12px 4px 18px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin-bottom: 22px; }
  .legend .lg { display: inline-flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .dot { width: 9px; height: 9px; border-radius: 3px; flex: none; }
  .dot.done { background: var(--done); } .dot.active { background: var(--active); }
  .dot.planned { background: var(--planned); } .dot.seam { background: var(--seam); }
  .legend .hint { color: var(--muted); opacity: .8; }

  /* ---- Main split ----------------------------------------------------- */
  .split { display: grid; grid-template-columns: minmax(0, 1fr) 340px; gap: 22px; align-items: start; }
  @media (max-width: 900px) { .split { grid-template-columns: 1fr; } }

  .graphcard { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; }
  .graphcard h2, .panel h2 { font-family: var(--mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin: 0; padding: 14px 16px; border-bottom: 1px solid var(--border); font-weight: 600; }
  .graphscroll { overflow-x: auto; overflow-y: hidden; }
  .graph { position: relative; margin: 0 auto; }
  .graph svg.edges { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .bandlabel { position: absolute; font-family: var(--mono); font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
  .bandlabel small { display: block; text-transform: none; letter-spacing: 0; opacity: .7; font-size: 10px; margin-top: 2px; }

  .node {
    position: absolute; text-align: left; cursor: pointer; font-family: inherit;
    background: var(--panel-2); border: 1px solid var(--border); border-left: 3px solid var(--planned);
    border-radius: 11px; padding: 9px 11px; color: var(--text); box-shadow: var(--shadow);
    transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease, opacity .12s ease;
    display: flex; flex-direction: column; gap: 5px;
  }
  .node.s-done { border-left-color: var(--done); } .node.s-active { border-left-color: var(--active); }
  .node.s-planned { border-left-color: var(--planned); } .node.s-seam { border-left-color: var(--seam); }
  .node:hover { transform: translateY(-2px); border-color: var(--accent); }
  .node.sel { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent), var(--shadow); }
  .node.dim { opacity: .32; }
  .node .nlabel { font-family: var(--mono); font-weight: 600; font-size: 12.5px; line-height: 1.2; color: var(--heading); display: flex; align-items: center; gap: 7px; }
  .node .tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .node .tag { font-family: var(--mono); font-size: 9.5px; letter-spacing: .02em; color: var(--muted); background: var(--panel); border: 1px solid var(--border); border-radius: 5px; padding: 1px 5px; }

  /* ---- Details panel -------------------------------------------------- */
  .panel { position: sticky; top: 18px; background: var(--panel); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); }
  .panelbody { padding: 16px; }
  .placeholder { color: var(--muted); font-size: 14px; }
  .placeholder b { color: var(--text); }
  .pill { display: inline-flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 99px; text-transform: uppercase; letter-spacing: .05em; }
  .pill.done { color: var(--done); background: var(--done-bg); } .pill.active { color: var(--active); background: var(--active-bg); }
  .pill.planned { color: var(--planned); background: var(--planned-bg); } .pill.seam { color: var(--seam); background: var(--seam-bg); }
  .panel h3 { font-size: 18px; color: var(--heading); margin: 12px 0 4px; letter-spacing: -.01em; }
  .panel .layerof { font-family: var(--mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .panel .desc { font-size: 14px; color: var(--text); margin: 12px 0; }
  .panel .tagrow { display: flex; flex-wrap: wrap; gap: 5px; margin: 8px 0 2px; }
  .panel .tagrow .tag { font-family: var(--mono); font-size: 10px; color: var(--muted); background: var(--panel-2); border: 1px solid var(--border); border-radius: 5px; padding: 2px 6px; }
  .sect { font-family: var(--mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin: 18px 0 8px; }
  .part { display: flex; gap: 9px; padding: 7px 0; border-top: 1px solid var(--border); }
  .part:first-of-type { border-top: none; }
  .part .pdot { width: 8px; height: 8px; border-radius: 3px; margin-top: 5px; flex: none; }
  .part .pl { font-family: var(--mono); font-size: 12.5px; color: var(--heading); font-weight: 600; }
  .part .pd { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  ul.links { list-style: none; margin: 6px 0 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
  ul.links a { font-family: var(--mono); font-size: 12px; word-break: break-all; }
  ul.links .k { color: var(--muted); }

  /* ---- Roadmap strip -------------------------------------------------- */
  .roadmap { margin-top: 26px; }
  .roadmap .grp { margin-top: 14px; }
  .roadmap .grp > .sect { margin: 0 0 10px; }
  .rline { display: flex; flex-wrap: wrap; gap: 8px; }
  .ritem { display: inline-flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 12px; color: var(--text); background: var(--panel); border: 1px solid var(--border); border-left: 3px solid var(--planned); border-radius: 9px; padding: 8px 12px; box-shadow: var(--shadow); }
  .ritem.s-done { border-left-color: var(--done); } .ritem.s-active { border-left-color: var(--active); }
  .ritem.s-planned { border-left-color: var(--planned); } .ritem.s-seam { border-left-color: var(--seam); }
  .ritem.s-planned { color: var(--muted); }

  footer { margin-top: 40px; padding-top: 18px; border-top: 1px solid var(--border); color: var(--muted); font-size: 12.5px; }
  footer code { font-family: var(--mono); background: var(--panel-2); border: 1px solid var(--border); border-radius: 5px; padding: 1px 5px; }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } .node:hover { transform: none; } }
</style>
</head>
<body>
<div class="wrap">
  <header class="mast">
    <div class="brand">
      <p class="eyebrow" id="eyebrow">Project map</p>
      <h1 id="pname"></h1>
      <p class="tagline" id="ptagline"></p>
      <p class="meta" id="pmeta"></p>
    </div>
    <div class="stats" id="stats"></div>
    <button class="themebtn" id="theme" type="button" aria-label="Toggle light / dark theme">◑ Theme</button>
  </header>

  <div class="legend" id="legend"></div>

  <div class="split">
    <section class="graphcard" aria-label="Architecture graph">
      <h2>Architecture — click a component</h2>
      <div class="graphscroll">
        <div class="graph" id="graph">
          <svg class="edges" id="edges" aria-hidden="true"></svg>
        </div>
      </div>
    </section>

    <aside class="panel" aria-live="polite">
      <h2>Details</h2>
      <div class="panelbody" id="panel">
        <p class="placeholder">Select a component in the map to see its <b>function</b>, <b>completion</b>, sub-parts, and links to its code and spec. Colours encode status — see the legend above.</p>
      </div>
    </aside>
  </div>

  <div class="roadmap" id="roadmap"></div>

  <footer id="footer"></footer>
</div>

<script src="project-map.js"></script>
<script>
(function () {
  "use strict";
  var M = window.PROJECT_MAP;
  if (!M) { document.getElementById("panel").textContent = "project-map.js failed to load."; return; }

  var $ = function (id) { return document.getElementById(id); };
  var el = function (tag, cls, txt) { var e = document.createElement(tag); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; };
  var byId = {}; M.nodes.forEach(function (n) { byId[n.id] = n; });

  // ---- Masthead + stats ----------------------------------------------
  $("pname").textContent = M.project.name;
  $("ptagline").textContent = M.project.tagline;
  $("pmeta").textContent = M.project.repo + "  ·  updated " + M.project.updated;

  var counts = { done: 0, active: 0, planned: 0, seam: 0 };
  M.nodes.forEach(function (n) { counts[n.status] = (counts[n.status] || 0) + 1; });
  var total = M.nodes.length;
  var statsWrap = $("stats");
  var prog = el("div", "stat progress");
  var pct = Math.round((counts.done / total) * 100);
  prog.innerHTML =
    '<div class="n">' + counts.done + " / " + total + "</div>" +
    '<div class="l">components shipped</div>' +
    '<div class="bar" role="img" aria-label="' + pct + '% shipped">' +
      '<i class="done" style="width:' + (counts.done / total * 100) + '%"></i>' +
      '<i class="active" style="width:' + (counts.active / total * 100) + '%"></i>' +
    "</div>";
  statsWrap.appendChild(prog);
  [["phases", (M.roadmap.filter(function (r) { return r.kind === "phase" && r.status === "done"; }).length) + " / " + M.roadmap.filter(function (r) { return r.kind === "phase"; }).length, "phases done"],
   ["harden", M.roadmap.filter(function (r) { return r.kind === "harden" && r.status === "done"; }).length + "", "hardening done"]]
    .forEach(function (s) { var d = el("div", "stat"); d.innerHTML = '<div class="n">' + s[1] + '</div><div class="l">' + s[2] + "</div>"; statsWrap.appendChild(d); });

  // ---- Legend ---------------------------------------------------------
  var legend = $("legend");
  ["done", "active", "planned", "seam"].forEach(function (k) {
    var s = M.statuses[k]; var lg = el("span", "lg");
    lg.innerHTML = '<span class="dot ' + k + '"></span><b style="color:var(--text)">' + s.label + '</b> <span class="hint">— ' + s.hint + "</span>";
    legend.appendChild(lg);
  });

  // ---- Layout ---------------------------------------------------------
  var NODE_W = 158, NODE_H = 60, GAP_X = 26, BAND_H = 132, PAD_L = 132, PAD_T = 26, PAD_R = 24;
  var layerIndex = {}; M.layers.forEach(function (l, i) { layerIndex[l.id] = i; });
  var byLayer = {}; M.layers.forEach(function (l) { byLayer[l.id] = []; });
  M.nodes.forEach(function (n) { (byLayer[n.layer] || (byLayer[n.layer] = [])).push(n); });
  var maxRow = Math.max.apply(null, M.layers.map(function (l) { return byLayer[l.id].length; }));
  var contentW = PAD_L + maxRow * NODE_W + (maxRow - 1) * GAP_X + PAD_R;
  var contentH = PAD_T + M.layers.length * BAND_H;

  var graph = $("graph");
  graph.style.width = contentW + "px";
  graph.style.height = contentH + "px";
  var edges = $("edges");
  edges.setAttribute("viewBox", "0 0 " + contentW + " " + contentH);

  var pos = {}; // id -> {x, y, cx, cy}
  M.layers.forEach(function (layer, li) {
    var row = byLayer[layer.id];
    var rowW = row.length * NODE_W + (row.length - 1) * GAP_X;
    var startX = PAD_L + ((maxRow * NODE_W + (maxRow - 1) * GAP_X) - rowW) / 2;
    var y = PAD_T + li * BAND_H;
    // band label
    var bl = el("div", "bandlabel");
    bl.style.left = "14px"; bl.style.top = (y + NODE_H / 2 - 12) + "px"; bl.style.width = (PAD_L - 24) + "px";
    bl.innerHTML = layer.label + (layer.hint ? "<small>" + layer.hint + "</small>" : "");
    graph.appendChild(bl);
    row.forEach(function (n, i) {
      var x = startX + i * (NODE_W + GAP_X);
      pos[n.id] = { x: x, y: y, cx: x + NODE_W / 2, cy: y + NODE_H / 2 };
    });
  });

  // ---- Edges (dependency curves) -------------------------------------
  var SVGNS = "http://www.w3.org/2000/svg";
  var edgeEls = [];
  M.nodes.forEach(function (n) {
    (n.deps || []).forEach(function (d) {
      if (!pos[d]) return;
      var a = pos[d], b = pos[n.id];
      var p = document.createElementNS(SVGNS, "path");
      var midY = (a.cy + b.cy) / 2;
      p.setAttribute("d", "M " + a.cx + " " + a.cy + " C " + a.cx + " " + midY + ", " + b.cx + " " + midY + ", " + b.cx + " " + b.cy);
      p.setAttribute("fill", "none");
      p.setAttribute("stroke", "var(--edge)");
      p.setAttribute("stroke-width", "1.4");
      p.dataset.a = d; p.dataset.b = n.id;
      edges.appendChild(p);
      edgeEls.push(p);
    });
  });

  // ---- Nodes ----------------------------------------------------------
  var nodeEls = {};
  M.nodes.forEach(function (n) {
    var p = pos[n.id];
    var b = document.createElement("button");
    b.type = "button";
    b.className = "node s-" + n.status;
    b.style.left = p.x + "px"; b.style.top = p.y + "px"; b.style.width = NODE_W + "px"; b.style.minHeight = NODE_H + "px";
    b.setAttribute("aria-label", n.label + " — " + M.statuses[n.status].label);
    var label = el("span", "nlabel");
    label.innerHTML = '<span class="dot ' + n.status + '"></span>' + n.label;
    b.appendChild(label);
    if (n.tags && n.tags.length) {
      var tg = el("span", "tags");
      n.tags.forEach(function (t) { tg.appendChild(el("span", "tag", t)); });
      b.appendChild(tg);
    }
    b.addEventListener("click", function () { select(n.id); });
    b.addEventListener("mouseenter", function () { highlight(n.id); });
    b.addEventListener("mouseleave", function () { if (!selectedId) clearHighlight(); else highlight(selectedId); });
    b.addEventListener("focus", function () { highlight(n.id); });
    graph.appendChild(b);
    nodeEls[n.id] = b;
  });

  // ---- Interaction ----------------------------------------------------
  var selectedId = null;

  function neighbors(id) {
    var set = {}; set[id] = true;
    (byId[id].deps || []).forEach(function (d) { set[d] = true; });
    M.nodes.forEach(function (n) { if ((n.deps || []).indexOf(id) >= 0) set[n.id] = true; });
    return set;
  }
  function highlight(id) {
    var set = neighbors(id);
    M.nodes.forEach(function (n) { nodeEls[n.id].classList.toggle("dim", !set[n.id]); });
    edgeEls.forEach(function (e) {
      var on = (e.dataset.a === id || e.dataset.b === id);
      e.setAttribute("stroke", on ? "var(--accent)" : "var(--edge)");
      e.setAttribute("stroke-width", on ? "2.2" : "1.4");
      e.setAttribute("opacity", on ? "1" : ".5");
    });
  }
  function clearHighlight() {
    M.nodes.forEach(function (n) { nodeEls[n.id].classList.remove("dim"); });
    edgeEls.forEach(function (e) { e.setAttribute("stroke", "var(--edge)"); e.setAttribute("stroke-width", "1.4"); e.setAttribute("opacity", "1"); });
  }

  function statusLabel(k) { return M.statuses[k] ? M.statuses[k].label : k; }

  function select(id) {
    selectedId = id;
    Object.keys(nodeEls).forEach(function (k) { nodeEls[k].classList.toggle("sel", k === id); });
    highlight(id);
    var n = byId[id];
    var layer = M.layers[layerIndex[n.layer]];
    var host = $("panel");
    host.innerHTML = "";
    host.appendChild((function () {
      var pill = el("span", "pill " + n.status);
      pill.innerHTML = '<span class="dot ' + n.status + '"></span>' + statusLabel(n.status);
      return pill;
    })());
    host.appendChild((function () { var e = el("div", "layerof", layer ? layer.label : n.layer); e.style.marginTop = "10px"; return e; })());
    host.appendChild(el("h3", null, n.label));
    if (n.tags && n.tags.length) {
      var tr = el("div", "tagrow"); n.tags.forEach(function (t) { tr.appendChild(el("span", "tag", t)); }); host.appendChild(tr);
    }
    host.appendChild(el("p", "desc", n.desc));

    if (n.parts && n.parts.length) {
      host.appendChild(el("div", "sect", "Sub-parts"));
      n.parts.forEach(function (pt) {
        var row = el("div", "part");
        var d = el("span", "pdot"); d.classList.add(pt.status);
        d.style.background = "var(--" + pt.status + ")";
        row.appendChild(d);
        var col = el("div"); var pl = el("div", "pl", pt.label);
        var badge = el("span", "tag"); badge.textContent = statusLabel(pt.status);
        badge.style.marginLeft = "7px"; badge.style.fontSize = "9px"; badge.style.color = "var(--" + pt.status + ")";
        pl.appendChild(badge);
        col.appendChild(pl); col.appendChild(el("div", "pd", pt.desc)); row.appendChild(col);
        host.appendChild(row);
      });
    }

    var links = [];
    (n.files || []).forEach(function (f) { links.push({ k: "code", label: f, href: f }); });
    (n.specs || []).forEach(function (s) { links.push({ k: "spec", label: s.label, href: s.href }); });
    if (links.length) {
      host.appendChild(el("div", "sect", "Code & specs"));
      var ul = el("ul", "links");
      links.forEach(function (lk) {
        var li = el("li");
        var a = el("a"); a.href = lk.href; a.textContent = lk.label;
        var k = el("span", "k", lk.k + " › "); li.appendChild(k); li.appendChild(a); ul.appendChild(li);
      });
      host.appendChild(ul);
    }
  }

  // ---- Roadmap strip --------------------------------------------------
  var rm = $("roadmap");
  rm.appendChild(el("div", "sect", "Roadmap"));
  [["phase", "Feature phases"], ["harden", "Hardening track"]].forEach(function (grp) {
    var g = el("div", "grp");
    g.appendChild(el("div", "sect", grp[1]));
    var line = el("div", "rline");
    M.roadmap.filter(function (r) { return r.kind === grp[0]; }).forEach(function (r) {
      var it = el("div", "ritem s-" + r.status);
      it.innerHTML = '<span class="dot ' + r.status + '"></span>' + r.label;
      line.appendChild(it);
    });
    g.appendChild(line); rm.appendChild(g);
  });

  $("footer").innerHTML =
    "This map is data + renderer: <code>project-map.js</code> holds this project's nodes; " +
    "<code>project-map.html</code> is a project-agnostic renderer — drop it into another repo and rewrite the JS to map that one. " +
    "Open locally via <code>file://</code>; statuses track the roadmap.";

  // ---- Theme toggle ---------------------------------------------------
  var root = document.documentElement;
  $("theme").addEventListener("click", function () {
    var cur = root.getAttribute("data-theme");
    if (!cur) cur = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    root.setAttribute("data-theme", cur === "dark" ? "light" : "dark");
  });
})();
</script>
</body>
</html>
