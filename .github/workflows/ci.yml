# Continuous integration for the Clean Web Economy.
#
# Two independent jobs run on every push and pull request:
#   * `rust`     — formats, lints, and tests the entire Cargo workspace.
#   * `contracts`— builds and tests the Solidity contracts with Foundry.
# Keeping them separate means a Solidity change and a Rust change surface their
# failures independently, and the jobs run in parallel.
name: CI

# Run on pushes to any branch and on pull requests, so work is validated before
# it is merged and whenever it is backed up to the remote.
on:
  push:
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Rust workspace: fmt (style), clippy (lint, warnings are errors), and tests.
  # ---------------------------------------------------------------------------
  rust:
    name: Rust workspace (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      # Check out the repository at the commit under test.
      - uses: actions/checkout@v4

      # Install the pinned stable toolchain plus the components CI needs. The
      # channel/target here mirror rust-toolchain.toml so local and CI agree.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      # Cache the cargo registry and build outputs to keep CI fast.
      - uses: Swatinem/rust-cache@v2

      # Fail the build on any formatting deviation.
      - name: Format check
        run: cargo fmt --all -- --check

      # Lint every crate and every target (libs, bins, tests). `-D warnings`
      # promotes all warnings to errors so lint debt cannot accumulate.
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Run the full workspace test suite.
      - name: Test
        run: cargo test --workspace

  # ---------------------------------------------------------------------------
  # Solidity contracts: compile and run the Foundry test suite.
  # ---------------------------------------------------------------------------
  contracts:
    name: Contracts (Foundry)
    runs-on: ubuntu-latest
    # `chain/` is a self-contained Foundry project; run every step from there.
    defaults:
      run:
        working-directory: chain
    steps:
      - uses: actions/checkout@v4

      # Install forge/cast/anvil. forge-std is vendored under chain/lib, so no
      # dependency fetch step is required.
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      # Compile the contracts; fails on any Solidity error.
      - name: Build
        run: forge build

      # Run the Solidity test suite (`*.t.sol`).
      - name: Test
        run: forge test -vvv

  # ---------------------------------------------------------------------------
  # Browser extension: build the WASM core + JS bundle and run the unit tests.
  # (The Playwright e2e needs a full Chromium download and is run separately.)
  # ---------------------------------------------------------------------------
  extension:
    name: Extension (WASM build + unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/browser-ext
    steps:
      - uses: actions/checkout@v4

      # Rust with the wasm target, for wasm-pack to compile the core.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      # wasm-pack turns the Rust core into a JS/WASM module.
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Reproducible install, then build (wasm + bundle) and run unit tests.
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test

      # Publish the built extension as a downloadable artifact.
      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: cwe-browser-ext
          path: clients/browser-ext/dist

  # ---------------------------------------------------------------------------
  # End-to-end demo: the Phase 1 exit criterion, run headlessly on Anvil.
  # register -> subscribe -> submit -> settle -> withdraw, asserting balances.
  # ---------------------------------------------------------------------------
  e2e:
    name: End-to-end demo (Anvil)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      # `jq` parses the settlement's proof output inside the demo script.
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run the demo
        run: make -C ops test-e2e

  # ---------------------------------------------------------------------------
  # Discovery Hub end-to-end demo: deploy -> register work -> sign & POST a
  # manifest -> resolve + search -> assert a non-registrant manifest is
  # rejected. Run headlessly on Anvil, same pattern as `e2e` above.
  # ---------------------------------------------------------------------------
  hub-e2e:
    name: Discovery Hub end-to-end demo (Anvil)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      # `jq` parses the deployment addresses and `curl` drives the hub's HTTP API.
      - name: Install jq and curl
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Run the demo
        run: make -C ops hub-demo

  # ---------------------------------------------------------------------------
  # Ownership & escrow end-to-end demo: register a multi-collaborator work whose
  # payees each consent to their share -> direct split payout; then a
  # fingerprint-matched unsigned copy -> escrow -> challenge by the earlier real
  # owner -> release. Run headlessly on Anvil, same pattern as `e2e` above.
  # ---------------------------------------------------------------------------
  ownership-e2e:
    name: Ownership & escrow end-to-end demo (Anvil)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      # `jq` parses the settlement's proof output inside the demo script.
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run the demo
        run: make -C ops ownership-demo

  # ---------------------------------------------------------------------------
  # Desktop player-agent end-to-end demo: register a signed work and a
  # fingerprint-matched work -> start the hub -> the agent subscribes, plays
  # both files (Tier 1 signed, Tier 2 fingerprint), and settles -> the
  # aggregator settles the epoch -> the signed work's payee withdraws directly
  # while the fingerprint-matched credit sits in escrow. Run headlessly on
  # Anvil, same pattern as `e2e` above.
  # ---------------------------------------------------------------------------
  player-e2e:
    name: Player-agent end-to-end demo (Anvil)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      # `jq` parses the deployment addresses and the settlement's proof output.
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run the demo
        run: make -C ops player-demo

  # ---------------------------------------------------------------------------
  # Arbitration-jury end-to-end demo: a fraudster registers first, the real
  # owner registers second on the same content -> a listener's fingerprint-
  # matched play escrows credit under the fraudster's work -> the real owner
  # challenges -> a 3-juror committee votes 2-1 for the real owner, overturning
  # what the earliest-registration default would have kept -> the verdict
  # reassigns the escrow and releases it to the real owner. Run headlessly on
  # Anvil, same pattern as `e2e` above.
  # ---------------------------------------------------------------------------
  arbitration-e2e:
    name: Arbitration-jury end-to-end demo (Anvil)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      # `jq` parses the deployment addresses and the settlement's proof output.
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run the demo
        run: make -C ops arbitration-demo

  # ---------------------------------------------------------------------------
  # Verifiable-credential lifecycle end-to-end demo: attest a verified-creator
  # credential -> registration succeeds; a non-credentialed address is
  # rejected; revoke -> blocked; a short-lived credential expires and is
  # rejected; re-attesting revives it; removing the issuer invalidates every
  # credential it granted; and a juror credential's attest/revoke transitions
  # are checked directly (the on-chain vote gate over the same credential is
  # covered by CWEJuryTest). Run headlessly on Anvil, same pattern as `e2e`
  # above.
  # ---------------------------------------------------------------------------
  identity-e2e:
    name: Verifiable-credential lifecycle demo (Anvil)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      # `jq` parses the deployment addresses inside the demo script.
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run the demo
        run: make -C ops identity-demo

  # ---------------------------------------------------------------------------
  # Anti-fraud demo: a deterministic proof of the DAPR model's core anti-fraud
  # properties — puppet plays are capped to break-even (never a profit),
  # bandwidth-discredited plays are a strict loss whose shortfall is conserved
  # into `unallocated`, and honest single-work fandom plus broad-appeal works
  # are never penalized. Pure Rust over `cwe-dapr`, so unlike the demos above
  # it needs no Foundry, Anvil, or jq — just the Cargo toolchain.
  # ---------------------------------------------------------------------------
  antifraud-e2e:
    name: Anti-fraud demo (DAPR model)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run the demo
        run: make -C ops antifraud-demo
